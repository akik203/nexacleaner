<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NexaCleaner Pro — Windows PC Cleaner</title>
  <style>
    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --surface2:  #1c2330;
      --border:    #30363d;
      --text:      #e6edf3;
      --muted:     #8b949e;
      --accent:    #e36209;
      --accent-dk: #b34500;
      --accent-lt: #f0883e;
      --green:     #3fb950;
      --blue:      #58a6ff;
      --radius:    10px;
      --mono:      'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 8%;
      background: rgba(13,17,23,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; color: var(--text); }
    .nav-logo span { color: var(--accent); }
    .nav-cta {
      background: var(--accent); color: #fff;
      padding: 8px 20px; border-radius: 6px;
      text-decoration: none; font-size: 14px; font-weight: 600;
      transition: background .2s;
    }
    .nav-cta:hover { background: var(--accent-lt); }

    .hero {
      padding: 130px 8% 80px;
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 60px; align-items: center;
      max-width: 1100px; margin: 0 auto;
    }
    .hero-eyebrow {
      font-family: var(--mono); font-size: 12px;
      color: var(--accent); letter-spacing: 1.5px;
      text-transform: uppercase; margin-bottom: 16px;
    }
    .hero h1 {
      font-size: clamp(28px, 4vw, 44px); font-weight: 800;
      line-height: 1.2; letter-spacing: -1px; margin-bottom: 20px;
    }
    .hero h1 em { font-style: normal; color: var(--accent); }
    .hero-sub { color: var(--muted); font-size: 16px; max-width: 440px; margin-bottom: 32px; }
    .hero-actions { display: flex; gap: 12px; flex-wrap: wrap; }

    .btn-primary {
      background: var(--accent); color: #fff;
      padding: 12px 28px; border-radius: var(--radius);
      text-decoration: none; font-weight: 700; font-size: 15px;
      border: none; cursor: pointer;
      transition: background .2s, transform .15s; display: inline-block;
    }
    .btn-primary:hover { background: var(--accent-lt); transform: translateY(-1px); }

    .btn-ghost {
      color: var(--muted); padding: 12px 20px;
      border-radius: var(--radius); text-decoration: none;
      font-size: 14px; border: 1px solid var(--border);
      transition: border-color .2s, color .2s; display: inline-block;
    }
    .btn-ghost:hover { border-color: var(--muted); color: var(--text); }

    .terminal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .terminal-bar {
      background: var(--surface2); padding: 10px 14px;
      display: flex; align-items: center; gap: 7px;
      border-bottom: 1px solid var(--border);
    }
    .dot { width: 11px; height: 11px; border-radius: 50%; }
    .dot-r { background: #ff5f57; }
    .dot-y { background: #febc2e; }
    .dot-g { background: #28c840; }
    .terminal-title {
      font-family: var(--mono); font-size: 11px; color: var(--muted);
      margin-left: auto; margin-right: auto;
    }
    .terminal-body { padding: 20px; font-family: var(--mono); font-size: 13px; line-height: 2; }
    .t-g { color: var(--green); }
    .t-b { color: var(--blue); }
    .t-o { color: var(--accent-lt); }
    .t-m { color: var(--muted); }
    .t-w { color: var(--text); }
    .t-cursor::after { content: '█'; animation: blink 1s step-start infinite; color: var(--accent); }
    @keyframes blink { 50% { opacity: 0; } }

    .section { padding: 70px 8%; max-width: 1100px; margin: 0 auto; }
    .section-label {
      font-family: var(--mono); font-size: 11px;
      color: var(--accent); letter-spacing: 2px;
      text-transform: uppercase; margin-bottom: 12px;
    }
    .section h2 {
      font-size: clamp(22px, 3vw, 34px); font-weight: 800;
      letter-spacing: -0.5px; margin-bottom: 12px;
    }
    .section-sub { color: var(--muted); font-size: 15px; margin-bottom: 48px; max-width: 560px; }

    .features-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
    }
    .feature-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 28px; transition: border-color .2s;
    }
    .feature-card:hover { border-color: var(--accent); }
    .feature-icon { font-size: 26px; margin-bottom: 14px; }
    .feature-card h3 { font-size: 16px; font-weight: 700; margin-bottom: 8px; color: var(--text); }
    .feature-card p { font-size: 14px; color: var(--muted); line-height: 1.7; }

    .trust-bar {
      background: var(--surface);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 24px 8%;
    }
    .trust-inner {
      max-width: 1100px; margin: 0 auto;
      display: flex; gap: 40px; flex-wrap: wrap;
      align-items: center; justify-content: center;
    }
    .trust-item { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--muted); }
    .trust-item span:first-child { color: var(--green); font-size: 16px; }

    .pricing-wrap {
      background: var(--surface);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 70px 8%;
    }
    .pricing-inner { max-width: 1100px; margin: 0 auto; }
    .pricing-cards {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 24px; max-width: 700px; margin: 0 auto;
    }
    .price-card {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 32px 28px; text-align: center;
    }
    .price-card.featured {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent), 0 8px 30px rgba(227,98,9,.15);
      position: relative;
    }
    .price-badge {
      position: absolute; top: -13px; left: 50%; transform: translateX(-50%);
      background: var(--accent); color: #fff;
      font-size: 11px; font-weight: 700; letter-spacing: 1px;
      text-transform: uppercase; padding: 4px 14px; border-radius: 20px;
    }
    .price-label { font-size: 13px; color: var(--muted); margin-bottom: 8px; }
    .price-amount { font-size: 48px; font-weight: 800; letter-spacing: -2px; color: var(--text); line-height: 1; }
    .price-currency { font-size: 22px; vertical-align: top; margin-top: 10px; display: inline-block; }
    .price-note { font-size: 12px; color: var(--muted); margin-top: 6px; margin-bottom: 24px; }
    .price-features { text-align: left; margin-bottom: 28px; }
    .price-features li {
      font-size: 13px; color: var(--muted); padding: 5px 0;
      list-style: none; display: flex; gap: 8px; align-items: flex-start;
    }
    .price-features li::before { content: '✓'; color: var(--green); flex-shrink: 0; }
    .price-card.dimmed { opacity: .55; }

    .policy-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px; }
    .policy-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; }
    .policy-card h3 { font-size: 15px; font-weight: 700; margin-bottom: 10px; }
